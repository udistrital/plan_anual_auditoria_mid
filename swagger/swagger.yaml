openapi: 3.0.0
paths:
  /:
    get:
      operationId: AppController_healthCheck
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - App
  /actividad:
    get:
      operationId: ActividadController_getAll
      parameters: []
      responses:
        '200':
          description: Actividades obtenidas.
      summary: Obtener todas las actividades
      tags: &ref_0
        - Actividad
  /actividad/{id}:
    get:
      operationId: ActividadController_getById
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Actividad obtenida.
      summary: Obtener actividad por ID
      tags: *ref_0
  /auditoria-estado:
    get:
      operationId: AuditoriaEstadoController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron estados.
      summary: Obtiene todos los estados de auditorías.
      tags: &ref_1
        - Auditoria Estado
  /auditoria-estado/{id}:
    get:
      operationId: AuditoriaEstadoController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID del estado de la auditoría.
          schema:
            type: string
      responses:
        '200':
          description: Estado obtenido con éxito.
        '404':
          description: No se encontró el estado.
      summary: Obtiene un estado de auditoría por ID.
      tags: *ref_1
  /auditoria/auditor/{personaId}:
    get:
      operationId: AuditoriaController_getByAuditor
      parameters:
        - name: personaId
          required: true
          in: path
          description: ID del auditor.
          schema:
            type: string
      responses:
        '200':
          description: Auditorías obtenidas.
        '404':
          description: Sin resultados.
      summary: Obtener auditorías por auditor
      tags: &ref_2
        - Auditoria
  /auditoria/auditado/{personaId}/{cargoId}:
    get:
      operationId: AuditoriaController_getByDependencia
      parameters:
        - name: personaId
          required: true
          in: path
          description: ID de la persona (tercero).
          schema:
            type: number
        - name: cargoId
          required: true
          in: path
          description: ID del cargo (312 o 320).
          schema:
            type: number
      responses:
        '200':
          description: Auditorías obtenidas.
        '404':
          description: Sin resultados.
      summary: Obtener auditorías por dependencia del usuario auditado
      tags: *ref_2
  /auditoria:
    get:
      operationId: AuditoriaController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Auditorías obtenidas.
        '404':
          description: Sin resultados.
      summary: Obtener todas las auditorías
      tags: *ref_2
  /auditoria/{id}/{planId}:
    delete:
      operationId: AuditoriaController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: ID de auditoría.
          schema:
            type: string
        - name: planId
          required: true
          in: path
          description: ID del plan de auditoría.
          schema:
            type: string
      responses:
        '200':
          description: Auditoría eliminada.
        '400':
          description: Parámetros inválidos.
        '500':
          description: Error interno.
      summary: Eliminar auditoría lógicamente
      tags: *ref_2
  /auditoria/{id}:
    get:
      operationId: AuditoriaController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID de auditoría.
          schema:
            type: string
      responses:
        '200':
          description: Auditoría obtenida.
        '404':
          description: Auditoría no encontrada.
      summary: Obtener auditoría por ID
      tags: *ref_2
  /auditor:
    get:
      operationId: AuditorController_getAll
      parameters:
        - name: queryParams
          required: false
          in: query
          description: Filtros opcionales.
          schema: {}
      responses:
        '200':
          description: Auditores obtenidos.
        '404':
          description: Sin resultados.
      summary: Obtener todos los auditores
      tags: &ref_3
        - Auditor
  /auditor/{id}:
    get:
      operationId: AuditorController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID del auditor.
          schema:
            type: string
      responses:
        '200':
          description: Auditor obtenido.
        '404':
          description: No encontrado.
      summary: Obtener auditor por ID
      tags: *ref_3
  /auditoria-padre/ordenadas:
    get:
      operationId: AuditoriaPadreController_getAuditoriasOrdenadas
      parameters:
        - name: orderDirection
          required: false
          in: query
          description: Dirección (ASC o DESC).
          schema: {}
        - name: orderBy
          required: false
          in: query
          description: Campo de orden.
          schema: {}
        - name: plan_auditoria_id
          required: true
          in: query
          description: ID del plan de auditoría (obligatorio).
          schema: {}
      responses:
        '200':
          description: Auditorías padre obtenidas.
        '400':
          description: Parámetros inválidos.
      summary: Obtener auditorías padre ordenadas
      tags: &ref_4
        - Auditoria Padre
  /auditoria-padre:
    get:
      operationId: AuditoriaPadreController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Auditorías padre obtenidas.
        '404':
          description: Sin resultados.
      summary: Obtener todas las auditorías padre
      tags: *ref_4
  /auditoria-padre/{id}:
    get:
      operationId: AuditoriaPadreController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID de auditoría padre.
          schema:
            type: string
      responses:
        '200':
          description: Auditoría padre obtenida.
        '404':
          description: Auditoría padre no encontrada.
      summary: Obtener auditoría padre por ID
      tags: *ref_4
  /auditoria-padre/{id}/{planId}:
    delete:
      operationId: AuditoriaPadreController_delete
      parameters:
        - name: id
          required: true
          in: path
          description: ID de auditoría padre.
          schema:
            type: string
        - name: planId
          required: true
          in: path
          description: ID del plan de auditoría.
          schema:
            type: string
      responses:
        '200':
          description: Auditoría padre eliminada.
        '400':
          description: Parámetros inválidos.
      summary: Eliminar auditoría padre lógicamente
      tags: *ref_4
  /auditoria-padre/{id}/generar-auditoria:
    post:
      operationId: AuditoriaPadreController_generarUnaAuditoria
      parameters:
        - name: id
          required: true
          in: path
          description: ID de la auditoría padre.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario_id:
                  type: number
                usuario_rol:
                  type: string
                observacion:
                  type: string
                estado_id_padre_actual:
                  type: number
                estado_id_padre_nuevo:
                  type: number
                estado_id_hija_nuevo:
                  type: number
                fase_id:
                  type: number
      responses:
        '201':
          description: Auditoría generada exitosamente.
        '400':
          description: Error en la solicitud.
      summary: Genera una auditoría hija para una auditoría padre específica.
      tags: *ref_4
  /cargue-masivo/auditorias/plantilla:
    get:
      operationId: CargueMasivoController_descargarPlantillaAuditorias
      parameters: []
      responses:
        '200':
          description: Plantilla descargada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  base64:
                    type: string
                    description: Archivo de plantilla en formato Base64.
        '500':
          description: Error interno.
      summary: Descargar plantilla de auditorías
      tags: &ref_5
        - Cargue Masivo
  /cargue-masivo/auditorias/plan/{planId}:
    get:
      operationId: CargueMasivoController_descargarAuditoriasExcel
      parameters:
        - name: planId
          required: true
          in: path
          description: ID del plan de auditoría.
          schema:
            type: string
      responses:
        '200':
          description: Archivo de auditorías descargado exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  base64:
                    type: string
                    description: Archivo de auditorías en formato Base64.
        '500':
          description: Error interno.
      summary: Descargar auditorías en formato Excel
      tags: *ref_5
  /cargue-masivo/auditorias:
    post:
      operationId: CargueMasivoController_cargueMasivo
      parameters: []
      requestBody:
        required: true
        description: Carga masiva de auditorías con datos en formato Base64.
        content:
          application/json:
            schema:
              type: object
              properties:
                base64data:
                  type: string
                  description: Archivo en formato Base64.
                complemento:
                  type: object
                  description: Datos complementarios.
              required:
                - base64data
                - complemento
      responses:
        '201':
          description: Carga masiva exitosa.
        '400':
          description: Datos inválidos.
        '500':
          description: Error interno.
      summary: Carga masiva de auditorías
      tags: *ref_5
  /cargue-masivo/actividades:
    post:
      operationId: CargueMasivoController_cargueMasivoActividades
      parameters: []
      requestBody:
        required: true
        description: Carga masiva de actividades con datos en formato Base64.
        content:
          application/json:
            schema:
              type: object
              properties:
                base64data:
                  type: string
                  description: Archivo en formato Base64.
                complemento:
                  type: object
                  description: Datos complementarios.
              required:
                - base64data
                - complemento
      responses:
        '201':
          description: Carga masiva exitosa.
        '400':
          description: Datos inválidos.
        '500':
          description: Error interno.
      summary: Carga masiva de actividades
      tags: *ref_5
  /plan-auditoria:
    get:
      operationId: PlanAuditoriaController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron planes.
      summary: Obtiene todos los planes de auditoría.
      tags: &ref_6
        - Plan Auditoría
  /plan-auditoria/{id}:
    get:
      operationId: PlanAuditoriaController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID del plan.
          schema:
            type: string
      responses:
        '200':
          description: Plan obtenido con éxito.
        '404':
          description: No se encontró el plan.
      summary: Obtiene un plan por ID.
      tags: *ref_6
  /plan-auditoria/{id}/generar-auditorias:
    post:
      operationId: PlanAuditoriaController_generarAuditorias
      parameters:
        - name: id
          required: true
          in: path
          description: ID del plan de auditoría.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario_id:
                  type: number
                usuario_rol:
                  type: string
                observacion:
                  type: string
                estado_id_padre_actual:
                  type: number
                estado_id_padre_nuevo:
                  type: number
                estado_id_hija_nuevo:
                  type: number
                fase_id:
                  type: number
      responses:
        '201':
          description: Auditorías generadas exitosamente.
        '400':
          description: Error en la solicitud.
      summary: Genera auditorías hijas para todas las auditorías padre de un plan.
      tags: *ref_6
  /plan-estado:
    get:
      operationId: PlanEstadoController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron estados.
      summary: Obtiene todos los estados de planes.
      tags: &ref_7
        - Plan Estado
  /plan-estado/{id}:
    get:
      operationId: PlanEstadoController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID del estado del plan.
          schema:
            type: string
      responses:
        '200':
          description: Estado obtenido con éxito.
        '404':
          description: No se encontró el estado.
      summary: Obtiene un estado de plan por ID.
      tags: *ref_7
  /plantilla/{id}:
    get:
      operationId: PlantillaController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID de la plantilla
          schema:
            type: string
        - name: conEspeciales
          required: false
          in: query
          description: Incluir caracteres especiales en la plantilla
          schema:
            default: false
            type: boolean
        - name: auditoria-padre
          required: false
          in: query
          description: >-
            Usar la auditoría padre en la plantilla en lugar de la colección de
            auditorías original
          schema:
            default: false
            type: boolean
      responses:
        '200':
          description: Plantilla encontrada.
      summary: Obtener plantilla por ID
      tags: &ref_8
        - Plantilla
  /plantilla/{tipo}/{idAuditoria}:
    get:
      operationId: PlantillaController_getPlantilla
      parameters:
        - name: tipo
          required: true
          in: path
          description: >-
            Tipo de la plantilla (ej: plan-trabajo, solicitud-informacion,
            carta-presentacion, programa-trabajo, informe-seguimiento,
            informe-auditoria)
          schema:
            type: string
        - name: idAuditoria
          required: true
          in: path
          description: ID de la auditoría
          schema:
            type: string
      responses:
        '200':
          description: Plantilla generada exitosamente.
        '404':
          description: Tipo de plantilla no encontrado.
      summary: Obtener plantilla dinámica según el tipo de auditoría
      tags: *ref_8
  /plantilla/docx/{tipo}/{idAuditoria}:
    get:
      operationId: PlantillaController_getPlantillaDOCX
      parameters:
        - name: tipo
          required: true
          in: path
          description: >-
            Tipo de la plantilla (ej: plan-trabajo, solicitud-informacion,
            carta-presentacion, programa-trabajo, informe-seguimiento,
            informe-auditoria)
          schema:
            type: string
        - name: idAuditoria
          required: true
          in: path
          description: ID de la auditoría
          schema:
            type: string
      responses:
        '200':
          description: Plantilla generada exitosamente.
        '404':
          description: Tipo de plantilla no encontrado.
      summary: Obtener plantilla dinámica según el tipo de auditoría en formato DOCX
      tags: *ref_8
  /informe/{id}:
    get:
      description: Retorna el informe con auditoría hallazgos y temas
      operationId: InformeController_getById
      parameters:
        - name: id
          required: true
          in: path
          description: ID del informe (MongoDB ObjectId)
          schema:
            type: string
      responses:
        '200':
          description: Informe obtenido exitosamente con datos complementarios
        '404':
          description: Informe no encontrado
      summary: Obtener informe consolidado para edición
      tags: &ref_9
        - Informe
  /informe:
    get:
      description: Lista informes con filtros opcionales y datos complementarios básicos
      operationId: InformeController_getAll
      parameters: []
      responses:
        '200':
          description: Informes obtenidos exitosamente
      summary: Obtener todos los informes
      tags: *ref_9
  /informe/auditoria/{auditoriaId}:
    get:
      description: Lista todos los informes activos de una auditoría específica
      operationId: InformeController_getByAuditoria
      parameters:
        - name: auditoriaId
          required: true
          in: path
          description: ID de la auditoría
          schema:
            type: string
      responses:
        '200':
          description: Informes de la auditoría obtenidos
      summary: Obtener informes por auditoría
      tags: *ref_9
  /informe/auditoria/{auditoriaId}/numeracion-hallazgo:
    put:
      description: >-
        Calcula y persiste el número jerárquico {tema}.{subtema}.{hallazgo}
        (no_hallazgo) en los hallazgos activos del informe de la auditoría.
        Idempotente.
      operationId: InformeController_actualizarNumeracionHallazgo
      parameters:
        - name: auditoriaId
          required: true
          in: path
          description: ID de la auditoría
          schema:
            type: string
      responses:
        '200':
          description: 'Resumen: { total, sellados, fallidos }'
        '404':
          description: Informe no encontrado
      summary: Asignar/recalcular la numeración de hallazgos del informe
      tags: *ref_9
  /auditado/{personaId}/documento:
    get:
      operationId: AuditadoController_filtrarDocumentosPorDependencia
      parameters:
        - name: personaId
          required: true
          in: path
          description: ID del auditado para filtrar los documentos.
          schema:
            type: number
        - name: auditoria_id
          required: true
          in: query
          description: ID de la auditoría para filtrar los documentos.
          schema:
            type: string
        - name: cargo_id
          required: true
          in: query
          description: ID del cargo del auditado para filtrar los documentos.
          schema:
            type: number
        - name: tipo_documento_id
          required: false
          in: query
          description: ID del tipo de documento para filtrar los documentos (opcional).
          schema:
            type: string
      responses:
        '200':
          description: Documentos filtrados exitosamente.
        '404':
          description: No se encontraron documentos para el auditado.
      summary: Filtrar los documentos a visualizar para el auditado
      tags:
        - Auditado
  /plan-mejoramiento-auditor:
    get:
      operationId: PlanMejoramientoAuditorController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron registros.
      summary: >-
        Obtiene todos los auditores del plan de mejoramiento con nombres
        resueltos.
      tags:
        - Plan Mejoramiento Auditor
  /plan-mejoramiento:
    get:
      operationId: PlanMejoramientoController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron registros.
      summary: Obtiene planes de mejoramiento con estado resuelto.
      tags:
        - Plan Mejoramiento
  /responsable-accion:
    get:
      operationId: ResponsableAccionController_getAll
      parameters:
        - name: filter
          required: false
          in: query
          description: Filtro opcional.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: No se encontraron registros.
      summary: Obtiene los responsables de acción con nombre de dependencia resuelto.
      tags:
        - Responsable Acción
  /gestion-accion:
    get:
      operationId: GestionAccionesController_getAll
      parameters:
        - name: offset
          required: false
          in: query
          schema: {}
        - name: limit
          required: false
          in: query
          schema: {}
        - name: hasta
          required: false
          in: query
          description: Fecha inicio máxima (ISO).
          schema: {}
        - name: desde
          required: false
          in: query
          description: Fecha inicio mínima (ISO).
          schema: {}
        - name: dependencia
          required: false
          in: query
          schema: {}
        - name: auditor
          required: false
          in: query
          schema: {}
        - name: no_accion
          required: false
          in: query
          schema: {}
        - name: no_hallazgo
          required: false
          in: query
          schema: {}
        - name: nombre_auditoria
          required: false
          in: query
          schema: {}
        - name: no_auditoria
          required: false
          in: query
          schema: {}
        - name: vigencia_id
          required: true
          in: query
          description: Vigencia a consultar.
          schema: {}
      responses:
        '200':
          description: Lista obtenida con éxito.
        '404':
          description: Error en la consulta.
      summary: >-
        Lista las acciones de mejora de una vigencia con auditoría, hallazgo,
        auditores y dependencias resueltos.
      tags:
        - Gestión de Acciones
info:
  title: Plan Anual Auditoria MID
  description: API MID para la gestion de planes de auditorias, auditorias y actividades
  version: 1.1.0
  contact: {}
tags: []
servers: []
components:
  schemas: {}
